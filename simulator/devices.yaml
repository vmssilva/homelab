devices:
  # 1. Lâmpada Principal com Switch Agrupado (Pai)
  - type: "light"
    id: "hub_sala"
    name: "Lâmpada da Sala"
    attributes:
      state: "OFF"
      brightness: 255

  - type: "light"
    id: "lampada_cozinha"
    configurations:
      device:
        identifiers: ["light.hub_sala"]
    attributes:
      state: "OFF"
      brightness: 180

  - type: energy
    id: "medidor_geral"
    name: "Medidor de Energia Geral"
  - type: fan
    id: fan
    configurations:
      preset_modes: ["eco", "nature", "turbo"]

