broker: localhost

devices:
  # Entidade 1: O trinco da fechadura
  - type: lock
    id: front_door_lock
    name: Fechadura da Entrada
    configurations:
      device:
        identifiers: ["hub_portaria_principal"]
        name: "Portaria Principal"
        model: "Smart Gateway de Acesso"

  # Entidade 2: O sensor magnético de abertura
  - type: binary_sensor
    id: front_door_sensor
    name: Sensor da Porta
    configurations:
      device:
        identifiers: ["hub_portaria_principal"] # MESMO ID! O HA vai juntar os dois aqui.
        name: "Portaria Principal"

  # --- OUTROS DISPOSITIVOS (Vão gerar seus próprios hardwares automáticos) ---
  - type: switch
    id: main_pump
    name: Bomba Principal

  - type: climate
    id: office_ac
    name: Ar do Escritório

  - type: vacuum
    id: living_room_robovac
    name: Robô Aspirador

  - type: light
    id: garage_light
    name: Luz da Garagem
    configurations:
      brightness: true
      supported_color_modes: [rgb, color_temp]
      schema: json

